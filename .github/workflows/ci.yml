name: Examples CI

on:
  push:
    paths:
      - "github-repo-example/**"
      - ".github/workflows/examples-ci.yml"
  pull_request:
    paths:
      - "github-repo-example/**"
      - ".github/workflows/examples-ci.yml"

jobs:
  test-example:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-repo-example

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: github-repo-example/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
